openapi: 3.1.0
info:
  title: Duplicate Event Filter API
  description: |
    Accepts incoming JSON events and deduplicates them within a 15-minute window.
    Both new and duplicate events return `202 Accepted` — deduplication is silent and idempotent.
  version: 1.0.0
  contact:
    name: Platform Team

servers:
  - url: /api/v1
    description: Version 1

tags:
  - name: events
    description: Event submission and deduplication
  - name: health
    description: Service health

paths:
  /events:
    post:
      tags:
        - events
      operationId: submitEvent
      summary: Submit an event for deduplication
      description: |
        Accepts a JSON event payload. If the event has been seen within the last 15 minutes
        (matched on `sourceId` + `eventType` + `entityId` + 15-minute timestamp bucket),
        it is silently suppressed. Both new and duplicate events return `202 Accepted`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
            examples:
              order_created:
                summary: New order created event
                value:
                  sourceId: "019612ab-1c3e-7000-8000-3e5f6a7b8c9d"
                  eventType: "ORDER_CREATED"
                  entityId: "order-99"
                  timestamp: "2026-03-24T10:11:00Z"
      responses:
        '202':
          description: Event accepted (new or duplicate — response is identical)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
              examples:
                accepted:
                  summary: Event accepted
                  value:
                    status: "accepted"
                    message: "Event received"
        '400':
          description: Bad request — missing or invalid required fields
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                missing_field:
                  summary: Missing required field
                  value:
                    type: "about:blank"
                    title: "Bad Request"
                    status: 400
                    detail: "sourceId must not be blank"
                invalid_uuid:
                  summary: Invalid UUID v7 format
                  value:
                    type: "about:blank"
                    title: "Bad Request"
                    status: 400
                    detail: "sourceId must be a valid UUID v7"
        '503':
          description: Service unavailable — Redis is unreachable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                redis_down:
                  summary: Redis unavailable
                  value:
                    type: "about:blank"
                    title: "Service Unavailable"
                    status: 503
                    detail: "Deduplication store is currently unavailable"

  /health:
    get:
      tags:
        - health
      operationId: getHealth
      summary: Health check
      description: Returns the health status of the service including Redis connectivity.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  summary: All components healthy
                  value:
                    status: "UP"
                    components:
                      redis:
                        status: "UP"
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                unhealthy:
                  summary: Redis down
                  value:
                    status: "DOWN"
                    components:
                      redis:
                        status: "DOWN"

components:
  schemas:
    EventRequest:
      type: object
      required:
        - sourceId
        - eventType
        - entityId
        - timestamp
      properties:
        sourceId:
          type: string
          description: |
            UUID v7 identifier for the upstream system submitting the event.
            Must conform to UUID v7 format: time-ordered, version bits = 7, variant bits = 10xx.
          pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
          example: "019612ab-1c3e-7000-8000-3e5f6a7b8c9d"
        eventType:
          type: string
          description: The type/category of the event.
          minLength: 1
          maxLength: 100
          example: "ORDER_CREATED"
        entityId:
          type: string
          description: Identifier of the domain entity the event relates to.
          minLength: 1
          maxLength: 255
          example: "order-99"
        timestamp:
          type: string
          format: date-time
          description: |
            ISO-8601 UTC timestamp of when the event occurred.
            Used to compute the 15-minute deduplication bucket.
          example: "2026-03-24T10:11:00Z"

    EventResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          description: Always "accepted" for a successful submission.
          example: "accepted"
        message:
          type: string
          description: Human-readable acknowledgement message.
          example: "Event received"

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Overall health status — "UP" or "DOWN".
          enum:
            - UP
            - DOWN
          example: "UP"
        components:
          type: object
          description: Per-component health details.
          additionalProperties:
            $ref: '#/components/schemas/ComponentHealth'

    ComponentHealth:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - UP
            - DOWN
          example: "UP"

    ProblemDetail:
      type: object
      description: RFC 7807 problem detail response for errors.
      properties:
        type:
          type: string
          example: "about:blank"
        title:
          type: string
          example: "Bad Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "sourceId must not be blank"
        instance:
          type: string
          example: "/api/v1/events"
